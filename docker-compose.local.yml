services:
  news_quickly:
    build: .
    ports:
      - '4444:4444'
    volumes:
      - news_quickly_data:/usr/app/.data
    environment:
      - G_CLIENT_ID=
      - G_CLIENT_SECRET=
      - JWT_SECRET=
      - INIT_TABLE=true
      - ENABLE_CACHE=true

volumes:
  news_quickly_data:
    name: news_quickly_data
